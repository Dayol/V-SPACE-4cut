<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>V-SPACE 네컷사진 Pro</title>
    <style>
        :root { --brand-color: #ff6b6b; --bg-gray: #f4f4f4; --cut-ratio: 16/10; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-gray); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: #333; }
        .app-container { width: 100%; max-width: 1200px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .step-section { display: none; width: 100%; animation: fadeIn 0.4s; }
        .step-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 설정 모달 */
        .settings-btn { position: fixed; top: 20px; right: 20px; z-index: 100; padding: 12px; background: white; border-radius: 50%; cursor: pointer; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 20px; }
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 200; box-shadow: 0 0 100px rgba(0,0,0,0.3); width: 380px; max-height: 90vh; overflow-y: auto; }
        .modal-backdrop { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); z-index: 199; }

        #cam-box { position: relative; width: 960px; aspect-ratio: var(--cut-ratio); background: #000; border-radius: 24px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.15); margin-bottom: 30px; display: flex; align-items: center; justify-content: center; }
        video, #snap-preview { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scaleX(-1); width: auto; height: 100%; min-width: 100%; object-fit: cover; }
        #snap-preview { display: none; z-index: 10; border: 10px solid var(--brand-color); box-sizing: border-box; }
        
        #timer { position: relative; z-index: 20; color: white; font-weight: bold; text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .countdown-num { font-size: 150px; text-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .cut-indicator { font-size: 40px; margin-bottom: 15px; opacity: 0.9; }

        .split-layout { display: flex; gap: 50px; justify-content: center; align-items: flex-start; width: 100%; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; width: 800px; }
        .photo-card { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; border: 4px solid transparent; background: #ddd; aspect-ratio: var(--cut-ratio); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .photo-card.selected { border-color: var(--brand-color); }
        .badge { position: absolute; top: 12px; right: 12px; background: var(--brand-color); color: white; width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 5; }

        .preview-panel { width: 320px; text-align: center; }
        #preview-canvas-container { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); }
        #final-preview-canvas { width: 100%; height: auto; aspect-ratio: 1 / 2.6; display: block; background: #fff; }

        button.main-btn { padding: 20px 40px; font-size: 20px; font-weight: bold; border-radius: 14px; border: none; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        .primary { background: var(--brand-color); color: white; }
        .airdrop { background-color: #007AFF; color: white; }
        .reset-btn { background-color: #eee; color: #333; }
        .frame-choice-btn { width: 100%; margin-top: 5px; padding: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 8px; font-size: 15px; }
        .frame-choice-btn.active { border-color: var(--brand-color); background: #fff0f0; }

        .setting-section-title { font-weight: bold; font-size: 15px; margin: 15px 0 10px; padding-bottom: 5px; border-bottom: 2px solid var(--brand-color); display: block; color: var(--brand-color); }
        .option-item { margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        .step3-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; text-align: left; width: 800px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .action-button-group { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; padding-top: 25px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    <div class="modal-backdrop" id="backdrop" onclick="toggleSettings()"></div>
    <div id="settings-modal">
        <h3 style="margin-top:0">⚙️ 프레임 개별 설정</h3>
        <span class="setting-section-title">공통 문구 입력</span>
        <input type="text" id="frame-text-input" oninput="updateAllDynamicTexts()" value="V-SPACE" placeholder="문구를 비우면 '네컷사진'만 표시됩니다" style="width:100%; padding:8px; margin-bottom:10px; box-sizing: border-box;">

        <span class="setting-section-title">기본 프레임 (흰색/검정)</span>
        <label class="option-item"><input type="checkbox" id="base-text-toggle" checked> 문구 표시</label>
        <label class="option-item"><input type="checkbox" id="base-date-toggle" checked> 날짜 표시</label>

        <span class="setting-section-title">업로드 이미지 프레임</span>
        <input type="file" id="frame-input" accept="image/*" style="width:100%; margin-bottom:10px; font-size:12px;">
        <label class="option-item"><input type="checkbox" id="custom-text-toggle"> 문구 표시</label>
        <label class="option-item"><input type="checkbox" id="custom-date-toggle" checked> 날짜 표시</label>
        <label class="option-item"><input type="checkbox" id="custom-shadow-toggle" checked> 글자 그림자 효과</label>
        
        <div style="font-size:13px; margin-top:5px;">글자 색상:
            <label style="margin-left:10px;"><input type="radio" name="font-color" value="black"> 검정</label>
            <label style="margin-left:5px;"><input type="radio" name="font-color" value="white" checked> 흰색</label>
        </div>
        <button onclick="applySettings()" class="primary" style="width:100%; margin-top:20px; padding:12px; border-radius:8px; border:none; cursor:pointer;">설정 적용</button>
    </div>

    <div class="app-container">
        <section id="step-1" class="step-section active">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <h1 id="main-title" style="font-size: 3rem; margin-bottom: 25px;">V-SPACE 네컷사진</h1>
                <div id="cam-box">
                    <video id="webcam" autoplay playsinline></video>
                    <img id="snap-preview">
                    <div id="timer" style="color:white; font-size:40px;">시작을 눌러주세요</div>
                </div>
                <button id="start-btn" class="main-btn primary">촬영 시작하기 (6회)</button>
            </div>
        </section>

        <section id="step-common" class="step-section">
            <div class="split-layout">
                <div style="text-align: center;">
                    <div id="title-step-2">
                        <h1 style="font-size: 2.5rem;">✨ 사진 선택</h1>
                        <div class="photo-grid" id="photo-grid"></div>
                        <button id="go-next-btn" class="main-btn primary" style="margin-top:35px; display:none; width:100%;">프레임 설정 단계로 ></button>
                    </div>

                    <div id="title-step-3" style="display:none; width:800px;">
                        <h1 style="font-size: 2.5rem;">🎨 프레임 & 필터</h1>
                        <div class="step3-controls">
                            <div class="control-group">
                                <strong>프레임 배경</strong>
                                <button class="frame-choice-btn active" id="btn-f-white" onclick="changeFrameMode('white')">흰색 배경</button>
                                <button class="frame-choice-btn" id="btn-f-black" onclick="changeFrameMode('black')">검정색 배경</button>
                                <button class="frame-choice-btn" id="btn-f-custom" onclick="changeFrameMode('custom')">V-SPACE 배경</button>
                            </div>
                            <div class="control-group">
                                <strong>사진 필터</strong>
                                <button class="frame-choice-btn" id="bright-btn" onclick="toggleBright()">밝게 필터: OFF</button>
                                <button class="frame-choice-btn" id="filter-btn" onclick="toggleFilter()">흑백 필터: OFF</button>
                            </div>
                            <div class="action-button-group">
                                <button id="save-btn" class="main-btn primary">이미지 저장</button>
                                <button id="airdrop-btn" class="main-btn airdrop">공유/에어드롭</button>
                                <button onclick="resetApp()" class="main-btn reset-btn">다시 촬영</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="preview-panel">
                    <h3>미리보기</h3>
                    <div id="preview-canvas-container">
                        <canvas id="final-preview-canvas"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const snapPreview = document.getElementById('snap-preview');
        const timerEl = document.getElementById('timer');
        const photoGrid = document.getElementById('photo-grid');
        const previewCanvas = document.getElementById('final-preview-canvas');
        const ctx = previewCanvas.getContext('2d');
        
        let capturedPhotos = [];
        let selectedPhotos = [];
        let isBW = false, isBright = false;
        let frameMode = 'white', customFrameImg = null;

        // 초기 이미지 로딩 (CORS 우회 설정 포함)
        customFrameImg = new Image();
        customFrameImg.crossOrigin = "anonymous";
        customFrameImg.src = '네컷대지 1.png';
        customFrameImg.onload = () => { if(selectedPhotos.length === 4) composeFinalImage(); };

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);

        function updateAllDynamicTexts() {
            const inputText = document.getElementById('frame-text-input').value.trim();
            const mainTitle = document.getElementById('main-title');
            const customBtn = document.getElementById('btn-f-custom');
            if(inputText) {
                mainTitle.innerText = inputText + " 네컷사진";
                customBtn.innerText = inputText + " 배경";
            } else {
                mainTitle.innerText = "네컷사진";
                customBtn.innerText = "네컷사진 배경";
            }
        }

        function toggleSettings() {
            const m = document.getElementById('settings-modal');
            const b = document.getElementById('backdrop');
            const isV = m.style.display === 'block';
            m.style.display = isV ? 'none' : 'block';
            b.style.display = isV ? 'none' : 'block';
        }

        function applySettings() { toggleSettings(); composeFinalImage(); }

        document.getElementById('frame-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { customFrameImg = img; composeFinalImage(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('start-btn').onclick = async function() {
            this.disabled = true; capturedPhotos = [];
            const vW = video.videoWidth, vH = video.videoHeight;
            const targetRatio = 16/10;
            let cW, cH, cX, cY;
            if(vW/vH > targetRatio) { cH=vH; cW=vH*targetRatio; cX=(vW-cW)/2; cY=0; }
            else { cW=vW; cH=vW/targetRatio; cX=0; cY=(vH-cH)/2; }

            for(let i=1; i<=6; i++) {
                await countdown(5, i);
                const canvas = document.createElement('canvas');
                canvas.width = 1280; canvas.height = 800;
                canvas.getContext('2d').drawImage(video, cX, cY, cW, cH, 0, 0, 1280, 800);
                const data = canvas.toDataURL('image/png');
                snapPreview.src = data; snapPreview.style.display = 'block';
                await sleep(1500); snapPreview.style.display = 'none';
                capturedPhotos.push(data);
            }
            renderSelection();
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-common').classList.add('active');
        };

        function countdown(sec, currentCut) { 
            return new Promise(resolve => { 
                let c = sec; 
                timerEl.innerHTML = `<div class="cut-indicator">${currentCut} / 6</div><div class="countdown-num">${c}</div>`;
                const itv = setInterval(() => { 
                    c--; 
                    if(c > 0) timerEl.innerHTML = `<div class="cut-indicator">${currentCut} / 6</div><div class="countdown-num">${c}</div>`;
                    else { clearInterval(itv); timerEl.innerHTML = `<div class="cut-indicator">${currentCut} / 6</div><div class="countdown-num" style="font-size: 80px;">📸</div>`; resolve(); }
                }, 1000); 
            }); 
        }

        function renderSelection() {
            photoGrid.innerHTML = '';
            capturedPhotos.forEach((src) => {
                const div = document.createElement('div'); div.className = 'photo-card';
                div.innerHTML = `<img src="${src}"><div class="badge"></div>`;
                div.onclick = () => {
                    const idx = selectedPhotos.indexOf(src);
                    if(idx > -1) { selectedPhotos.splice(idx,1); div.classList.remove('selected'); }
                    else if(selectedPhotos.length < 4) { selectedPhotos.push(src); div.classList.add('selected'); }
                    updateBadges();
                    composeFinalImage();
                };
                photoGrid.appendChild(div);
            });
            composeFinalImage();
        }

        function updateBadges() {
            document.querySelectorAll('.photo-card').forEach(card => {
                const imgSource = card.querySelector('img').src;
                const badge = card.querySelector('.badge');
                const sIdx = selectedPhotos.indexOf(imgSource);
                if(sIdx > -1) { badge.innerText = sIdx + 1; badge.style.display = 'flex'; }
                else { badge.style.display = 'none'; }
            });
            document.getElementById('go-next-btn').style.display = (selectedPhotos.length === 4) ? 'block' : 'none';
        }

        /* [사파리 필터 대응 핵심 함수] */
        async function composeFinalImage() {
            if(selectedPhotos.length < 4) return;
            const cw = 800, ch = 2150; 
            previewCanvas.width = cw; previewCanvas.height = ch;
            
            // 캔버스 초기화
            ctx.clearRect(0, 0, cw, ch);
            ctx.filter = 'none';

            // 배경 그리기
            if(frameMode === 'custom' && customFrameImg && customFrameImg.complete) {
                ctx.drawImage(customFrameImg, 0, 0, cw, ch);
            } else {
                ctx.fillStyle = (frameMode === 'black') ? '#000' : '#fff';
                ctx.fillRect(0, 0, cw, ch);
            }

            const padH = 40, photoTop = 40, photoGap = 25;
            const photoW = cw - (padH * 2), photoH = photoW / (16/10);

            for(let i=0; i<4; i++) {
                const y = photoTop + (i * (photoH + photoGap));
                if(selectedPhotos[i]) {
                    const img = new Image();
                    img.src = selectedPhotos[i];
                    await new Promise(r => img.onload = r);
                    
                    ctx.save();
                    
                    // 사파리 대응용 필터 문자열 생성
                    let filterStr = '';
                    if(isBW) filterStr += 'grayscale(100%) ';
                    if(isBright) filterStr += 'brightness(1.2) contrast(1.1) ';
                    
                    // 필터 적용 전 상태 설정
                    ctx.filter = filterStr.trim() || 'none';
                    
                    // 좌우 반전 이미지 그리기
                    ctx.translate(cw, 0); 
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, padH, y, photoW, photoH);
                    
                    ctx.restore();
                    // 사파리에서는 상태 복구 후 다시 명시적으로 필터를 꺼야 다음 요소에 영향을 안 줌
                    ctx.filter = 'none';
                }
            }

            // 텍스트 렌더링 (필터가 꺼진 상태여야 함)
            renderOverlayText(cw, ch, photoTop, photoH, photoGap);
        }

        function renderOverlayText(cw, ch, photoTop, photoH, photoGap) {
            let showText, showDate, finalColor, useShadow = false;
            if(frameMode === 'custom') {
                showText = document.getElementById('custom-text-toggle').checked;
                showDate = document.getElementById('custom-date-toggle').checked;
                useShadow = document.getElementById('custom-shadow-toggle').checked;
                const fontColorEl = document.querySelector('input[name="font-color"]:checked');
                finalColor = fontColorEl ? fontColorEl.value : 'white';
            } else {
                showText = document.getElementById('base-text-toggle').checked;
                showDate = document.getElementById('base-date-toggle').checked;
                finalColor = (frameMode === 'black') ? 'white' : 'black';
            }

            const photoBottom = photoTop + (4 * photoH) + (3 * photoGap);
            const textY = photoBottom + 75; 

            if(showText || showDate) {
                ctx.save();
                ctx.filter = 'none'; // 텍스트에 필터 적용 방지
                ctx.fillStyle = finalColor; ctx.textAlign = "center";
                if(useShadow) {
                    ctx.shadowColor = (finalColor === 'white') ? "rgba(0,0,0,0.5)" : "rgba(255,255,255,0.5)";
                    ctx.shadowBlur = 10; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
                }
                if(showText) {
                    const txt = document.getElementById('frame-text-input').value;
                    if(txt) { ctx.font = "bold 55px sans-serif"; ctx.fillText(txt, cw/2, textY + 30); }
                }
                if(showDate) {
                    const now = new Date();
                    const dStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
                    ctx.font = "30px sans-serif"; ctx.fillText(dStr, cw/2, textY + 90);
                }
                ctx.restore();
            }
        }

        // 저장 및 공유 버튼 로직
        document.getElementById('save-btn').onclick = function() {
            if(selectedPhotos.length < 4) return alert("사진 4장을 선택해주세요!");
            const link = document.createElement('a');
            link.download = `V-SPACE_4cut_${Date.now()}.png`;
            link.href = previewCanvas.toDataURL('image/png', 1.0);
            link.click();
        };

        document.getElementById('airdrop-btn').onclick = async function() {
            if(selectedPhotos.length < 4) return alert("사진 4장을 선택해주세요!");
            previewCanvas.toBlob(async (blob) => {
                const file = new File([blob], `V-SPACE.png`, { type: 'image/png' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'V-SPACE' });
                } else {
                    document.getElementById('save-btn').click();
                }
            });
        };

        function resetApp() { location.reload(); }
        function changeFrameMode(mode) {
            frameMode = mode;
            document.querySelectorAll('.frame-choice-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-f-${mode}`).classList.add('active');
            composeFinalImage();
        }
        document.getElementById('go-next-btn').onclick = () => {
            document.getElementById('title-step-2').style.display = 'none';
            document.getElementById('title-step-3').style.display = 'block';
            composeFinalImage();
        };
        function toggleFilter() { isBW = !isBW; document.getElementById('filter-btn').innerText = `흑백 필터: ${isBW ? 'ON' : 'OFF'}`; composeFinalImage(); }
        function toggleBright() { isBright = !isBright; document.getElementById('bright-btn').innerText = `밝게 필터: ${isBright ? 'ON' : 'OFF'}`; composeFinalImage(); }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
