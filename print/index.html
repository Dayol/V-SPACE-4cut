<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>V-SPACE 네컷사진 Pro</title>
    <style>
        :root { --brand-color: #ff6b6b; --bg-gray: #f4f4f4; --cut-ratio: 1.5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-gray); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: #333; }
        .app-container { width: 100%; max-width: 1200px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .step-section { display: none; width: 100%; animation: fadeIn 0.4s; }
        .step-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 200; box-shadow: 0 0 100px rgba(0,0,0,0.3); width: 380px; max-height: 90vh; overflow-y: auto; }
        .modal-backdrop { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); z-index: 199; }
        .settings-btn { position: fixed; top: 20px; right: 20px; z-index: 100; padding: 12px; background: white; border-radius: 50%; cursor: pointer; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 20px; }

        #cam-box { position: relative; width: 960px; aspect-ratio: var(--cut-ratio); background: #000; border-radius: 24px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.15); margin-bottom: 30px; display: flex; align-items: center; justify-content: center; }
        video, #snap-preview { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scaleX(-1); width: auto; height: 100%; min-width: 100%; object-fit: cover; }
        #snap-preview { display: none; z-index: 10; border: 10px solid var(--brand-color); box-sizing: border-box; }
        
        #timer { position: relative; z-index: 20; color: white; font-weight: bold; text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .countdown-num { font-size: 150px; text-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .cut-indicator { font-size: 40px; margin-bottom: 15px; opacity: 0.9; }

        .split-layout { display: flex; gap: 50px; justify-content: center; align-items: flex-start; width: 100%; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; width: 800px; }
        .photo-card { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; border: 4px solid transparent; background: #ddd; aspect-ratio: var(--cut-ratio); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .photo-card.selected { border-color: var(--brand-color); }
        .badge { position: absolute; top: 12px; right: 12px; background: var(--brand-color); color: white; width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; z-index: 5; }

        .preview-panel { width: 320px; text-align: center; }
        #preview-canvas-container { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); }
        #final-preview-canvas { width: 100%; height: auto; aspect-ratio: 1 / 2.96; display: block; background: #fff; }

        button.main-btn { padding: 20px 40px; font-size: 18px; font-weight: bold; border-radius: 14px; border: none; cursor: pointer; transition: 0.2s; box-sizing: border-box; text-align: center; }
        .primary { background: var(--brand-color); color: white; }
        .airdrop { background-color: #007AFF; color: white; }
        .print-btn { background-color: #4CAF50; color: white; }
        .reset-btn { background-color: #eee; color: #333; }
        
        .action-button-group { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; padding-top: 25px; border-top: 1px solid #ddd; }
        .action-button-group button { width: 100%; }
        .full-row { grid-column: 1 / -1; }

        .frame-choice-btn { width: 100%; margin-top: 5px; padding: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 8px; font-size: 15px; }
        .frame-choice-btn.active { border-color: var(--brand-color); background: #fff0f0; }

        .setting-section-title { font-weight: bold; font-size: 15px; margin: 15px 0 10px; padding-bottom: 5px; border-bottom: 2px solid var(--brand-color); display: block; color: var(--brand-color); }
        .option-item { margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .step3-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; text-align: left; width: 800px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }

        .print-modal-content { text-align: center; }
        .print-pw-input { width: 100px; padding: 8px; text-align: center; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .small-print-btn { padding: 10px 20px; font-size: 14px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }

        #print-canvas { display: none; }

        @media print {
            body * { visibility: hidden; }
            #print-canvas { visibility: visible; display: block !important; position: fixed; left: 0; top: 0; width: 100%; height: 100%; object-fit: contain; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    <div class="modal-backdrop" id="backdrop" onclick="closeAllModals()"></div>

    <div id="settings-modal" class="modal">
        <h3 style="margin-top:0">⚙️ 프레임 개별 설정</h3>
        <span class="setting-section-title">공통 문구 입력</span>
        <input type="text" id="frame-text-input" oninput="updateAllDynamicTexts()" value="V-SPACE" style="width:100%; padding:8px; margin-bottom:10px; box-sizing: border-box;">
        <span class="setting-section-title">기본 프레임 (흰색/검정)</span>
        <label class="option-item"><input type="checkbox" id="base-text-toggle" checked> 문구 표시</label>
        <label class="option-item"><input type="checkbox" id="base-date-toggle" checked> 날짜 표시</label>
        <span class="setting-section-title">업로드 이미지 프레임</span>
        <input type="file" id="frame-input" accept="image/*" style="width:100%; margin-bottom:10px; font-size:12px;">
        <label class="option-item"><input type="checkbox" id="custom-text-toggle" checked> 문구 표시</label>
        <label class="option-item"><input type="checkbox" id="custom-date-toggle" checked> 날짜 표시</label>
        <label class="option-item"><input type="checkbox" id="custom-shadow-toggle" checked> 그림자 효과</label>
        <div style="font-size:13px;">글자 색상:
            <label><input type="radio" name="font-color" value="black"> 검정</label>
            <label><input type="radio" name="font-color" value="white" checked> 흰색</label>
        </div>
        <button onclick="applySettings()" class="primary" style="width:100%; margin-top:20px; padding:12px; border:none; border-radius:8px; cursor:pointer;">설정 적용</button>
    </div>

    <div id="print-modal" class="modal">
        <div class="print-modal-content">
            <h2 style="margin-bottom:10px;">🖨️ 사진 인쇄</h2>
            <p style="font-weight: bold; color: var(--brand-color);">카운터로 문의하세요</p>
            <input type="password" id="print-password" class="print-pw-input" placeholder="비밀번호" maxlength="4">
            <br>
            <button onclick="executeFinalPrint()" class="small-print-btn">진짜 인쇄하기</button>
        </div>
    </div>

    <div class="app-container">
        <section id="step-1" class="step-section active">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <h1 id="main-title" style="font-size: 3.5rem; margin-bottom: 25px;">V-SPACE 네컷사진</h1>
                <div id="cam-box">
                    <video id="webcam" autoplay playsinline></video>
                    <img id="snap-preview">
                    <div id="timer" style="color:white; font-size:40px;">시작을 눌러주세요</div>
                </div>
                <button id="start-btn" class="main-btn primary">촬영 시작하기 (6회)</button>
            </div>
        </section>

        <section id="step-common" class="step-section">
            <div class="split-layout">
                <div style="text-align: center;">
                    <div id="title-step-2">
                        <h1 style="font-size: 2.5rem;">✨ 사진 선택</h1>
                        <div class="photo-grid" id="photo-grid"></div>
                        <button id="go-next-btn" class="main-btn primary" style="margin-top:35px; display:none; width:100%;">프레임 설정 단계로 ></button>
                    </div>

                    <div id="title-step-3" style="display:none; width:800px;">
                        <h1 style="font-size: 2.5rem;">🎨 프레임 & 필터</h1>
                        <div class="step3-controls">
                            <div class="control-group">
                                <strong>프레임 배경</strong>
                                <button class="frame-choice-btn active" id="btn-f-white" onclick="changeFrameMode('white')">흰색 배경</button>
                                <button class="frame-choice-btn" id="btn-f-black" onclick="changeFrameMode('black')">검정색 배경</button>
                                <button class="frame-choice-btn" id="btn-f-custom" onclick="changeFrameMode('custom')">V-SPACE 배경</button>
                            </div>
                            <div class="control-group">
                                <strong>사진 필터</strong>
                                <button class="frame-choice-btn" id="bright-btn" onclick="toggleBright()">밝게 필터: OFF</button>
                                <button class="frame-choice-btn" id="filter-btn" onclick="toggleFilter()">흑백 필터: OFF</button>
                            </div>
                            <div class="action-button-group">
                                <button id="save-btn" class="main-btn primary">이미지 저장</button>
                                <button id="airdrop-btn" class="main-btn airdrop">공유/에어드롭</button>
                                <button onclick="openPrintModal()" class="main-btn print-btn">인쇄하기</button>
                                <button onclick="resetApp()" class="main-btn reset-btn full-row">다시 촬영하기</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="preview-panel">
                    <h3>미리보기</h3>
                    <div id="preview-canvas-container">
                        <canvas id="final-preview-canvas"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <canvas id="print-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const snapPreview = document.getElementById('snap-preview');
        const timerEl = document.getElementById('timer');
        const photoGrid = document.getElementById('photo-grid');
        const previewCanvas = document.getElementById('final-preview-canvas');
        const printCanvas = document.getElementById('print-canvas');
        const ctx = previewCanvas.getContext('2d');
        const pCtx = printCanvas.getContext('2d');
        
        let capturedPhotos = [];
        let selectedPhotos = [];
        let isBW = false, isBright = false;
        let frameMode = 'white', customFrameImg = null;

        function initBackground() {
            customFrameImg = new Image();
            customFrameImg.crossOrigin = "anonymous";
            customFrameImg.onload = () => composeFinalImage();
            customFrameImg.src = '네컷대지2.png';
        }
        initBackground();

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);

        function updateAllDynamicTexts() {
            const txt = document.getElementById('frame-text-input').value.trim();
            document.getElementById('main-title').innerText = txt ? txt + " 네컷사진" : "네컷사진";
            document.getElementById('btn-f-custom').innerText = txt ? txt + " 배경" : "네컷사진 배경";
        }

        function toggleSettings() {
            document.getElementById('settings-modal').style.display = 'block';
            document.getElementById('backdrop').style.display = 'block';
        }
        function openPrintModal() {
            if(selectedPhotos.length < 4) return alert("사진 4장을 선택해주세요!");
            document.getElementById('print-modal').style.display = 'block';
            document.getElementById('backdrop').style.display = 'block';
        }
        function closeAllModals() {
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('print-modal').style.display = 'none';
            document.getElementById('backdrop').style.display = 'none';
        }
        function applySettings() {
            closeAllModals();
            composeFinalImage();
        }

        async function executeFinalPrint() {
            if(document.getElementById('print-password').value === '1357') {
                closeAllModals();
                const singleW = 800, singleH = 2368;
                printCanvas.width = singleW * 2;
                printCanvas.height = singleH;
                pCtx.fillStyle = 'white';
                pCtx.fillRect(0, 0, printCanvas.width, printCanvas.height);

                const finalImg = new Image();
                finalImg.src = previewCanvas.toDataURL('image/png');
                await new Promise(r => finalImg.onload = r);

                pCtx.drawImage(finalImg, 0, 0, singleW, singleH);
                pCtx.drawImage(finalImg, singleW, 0, singleW, singleH);
                window.print();
            } else { alert("비밀번호가 틀렸습니다."); }
        }

        document.getElementById('start-btn').onclick = async function() {
            this.disabled = true; capturedPhotos = [];
            const vW = video.videoWidth, vH = video.videoHeight;
            const ratio = 1.5; 
            let cW, cH, cX, cY;
            if(vW/vH > ratio) { cH=vH; cW=vH*ratio; cX=(vW-cW)/2; cY=0; }
            else { cW=vW; cH=vW/ratio; cX=0; cY=(vH-cH)/2; }

            for(let i=1; i<=6; i++) {
                await countdown(5, i);
                const canvas = document.createElement('canvas');
                canvas.width = 1200; canvas.height = 800; 
                canvas.getContext('2d').drawImage(video, cX, cY, cW, cH, 0, 0, 1200, 800);
                const data = canvas.toDataURL('image/png');
                snapPreview.src = data; snapPreview.style.display = 'block';
                await sleep(1500); snapPreview.style.display = 'none';
                capturedPhotos.push(data);
            }
            renderSelection();
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-common').classList.add('active');
        };

        function countdown(sec, cur) { 
            return new Promise(resolve => { 
                let c = sec; 
                timerEl.innerHTML = `<div class="cut-indicator">${cur} / 6</div><div class="countdown-num">${c}</div>`;
                const itv = setInterval(() => { 
                    c--; 
                    if(c > 0) timerEl.innerHTML = `<div class="cut-indicator">${cur} / 6</div><div class="countdown-num">${c}</div>`;
                    else { clearInterval(itv); timerEl.innerHTML = `<div class="cut-indicator">${cur} / 6</div><div class="countdown-num" style="font-size: 80px;">📸</div>`; resolve(); }
                }, 1000); 
            }); 
        }

        function renderSelection() {
            photoGrid.innerHTML = '';
            capturedPhotos.forEach((src) => {
                const div = document.createElement('div'); div.className = 'photo-card';
                div.innerHTML = `<img src="${src}"><div class="badge"></div>`;
                div.onclick = () => {
                    const idx = selectedPhotos.indexOf(src);
                    if(idx > -1) { selectedPhotos.splice(idx,1); div.classList.remove('selected'); }
                    else if(selectedPhotos.length < 4) { selectedPhotos.push(src); div.classList.add('selected'); }
                    updateBadges(); composeFinalImage();
                };
                photoGrid.appendChild(div);
            });
            composeFinalImage();
        }

        function updateBadges() {
            document.querySelectorAll('.photo-card').forEach(card => {
                const badge = card.querySelector('.badge');
                const sIdx = selectedPhotos.indexOf(card.querySelector('img').src);
                badge.innerText = sIdx + 1;
                badge.style.display = sIdx > -1 ? 'flex' : 'none';
            });
            document.getElementById('go-next-btn').style.display = selectedPhotos.length === 4 ? 'block' : 'none';
        }

        async function composeFinalImage() {
            const cw = 800, ch = 2368; 
            previewCanvas.width = cw; previewCanvas.height = ch;
            ctx.clearRect(0, 0, cw, ch);
            ctx.filter = 'none';

            if(frameMode === 'custom' && customFrameImg && customFrameImg.complete && customFrameImg.naturalWidth !== 0) {
                ctx.drawImage(customFrameImg, 0, 0, cw, ch);
            } else {
                ctx.fillStyle = (frameMode === 'black') ? '#000' : '#fff';
                ctx.fillRect(0, 0, cw, ch);
            }

            const padH = 40, photoTop = 40, photoGap = 25;
            const photoW = cw - (padH * 2);
            const photoH = photoW / 1.5; 

            for(let i=0; i<4; i++) {
                const y = photoTop + (i * (photoH + photoGap));
                if(selectedPhotos[i]) {
                    const img = new Image(); img.src = selectedPhotos[i];
                    await new Promise(r => img.onload = r);
                    ctx.save();
                    let f = [];
                    if(isBW) f.push('grayscale(100%)');
                    if(isBright) f.push('brightness(1.2) contrast(1.1)');
                    ctx.filter = f.length > 0 ? f.join(' ') : 'none';
                    ctx.translate(cw, 0); ctx.scale(-1, 1);
                    ctx.drawImage(img, padH, y, photoW, photoH);
                    ctx.restore();
                } else { ctx.fillStyle = "rgba(200,200,200,0.3)"; ctx.fillRect(padH, y, photoW, photoH); }
            }
            renderOverlayText(cw, ch, photoTop, photoH, photoGap);
        }

        function renderOverlayText(cw, ch, photoTop, photoH, photoGap) {
            let showText, showDate, finalColor, useShadow = false;
            if(frameMode === 'custom') {
                showText = document.getElementById('custom-text-toggle').checked;
                showDate = document.getElementById('custom-date-toggle').checked;
                useShadow = document.getElementById('custom-shadow-toggle').checked;
                finalColor = document.querySelector('input[name="font-color"]:checked').value === 'white' ? 'white' : 'black';
            } else {
                showText = document.getElementById('base-text-toggle').checked;
                showDate = document.getElementById('base-date-toggle').checked;
                finalColor = (frameMode === 'black') ? 'white' : 'black';
            }

            const photoBottom = photoTop + (4 * photoH) + (3 * photoGap);
            const textY = photoBottom + ((ch - photoBottom) / 2);

            if(showText || showDate) {
                ctx.save();
                ctx.filter = 'none';
                ctx.fillStyle = finalColor; ctx.textAlign = "center";
                if(useShadow) {
                    ctx.shadowColor = (finalColor === 'white') ? "rgba(0,0,0,0.5)" : "rgba(255,255,255,0.5)";
                    ctx.shadowBlur = 10; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
                }
                if(showText) {
                    const txt = document.getElementById('frame-text-input').value;
                    if(txt) { 
                        ctx.font = "bold 70px sans-serif"; // [변경] 55px -> 82.5px (1.5배)
                        ctx.fillText(txt, cw/2, textY - 40); 
                    }
                }
                if(showDate) {
                    const now = new Date();
                    const dStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
                    ctx.font = "40px sans-serif"; // [변경] 30px -> 45px (1.5배)
                    ctx.fillText(dStr, cw/2, textY + 25); // 폰트가 커짐에 따라 텍스트 간격 조정
                }
                ctx.restore();
            }
        }

        document.getElementById('frame-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { customFrameImg = img; composeFinalImage(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('save-btn').onclick = function() {
            if(selectedPhotos.length < 4) return alert("사진 4장을 선택해주세요!");
            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            const timeStr = String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
            const link = document.createElement('a');
            link.download = `V-SPACE_4cut_${dateStr}_${timeStr}.png`;
            link.href = previewCanvas.toDataURL('image/png', 1.0);
            link.click();
        };

        document.getElementById('airdrop-btn').onclick = async function() {
            if(selectedPhotos.length < 4) return alert("사진 4장을 선택해주세요!");
            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            const timeStr = String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
            previewCanvas.toBlob(async (blob) => {
                const file = new File([blob], `V-SPACE_4cut_${dateStr}_${timeStr}.png`, { type: 'image/png' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'V-SPACE 네컷사진' });
                } else { document.getElementById('save-btn').click(); }
            });
        };

        function resetApp() { if(!confirm("다시 촬영하시겠습니까?")) return; location.reload(); }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        function changeFrameMode(mode) { frameMode = mode; document.querySelectorAll('.frame-choice-btn').forEach(b => b.classList.remove('active')); document.getElementById(`btn-f-${mode}`).classList.add('active'); composeFinalImage(); }
        document.getElementById('go-next-btn').onclick = () => { document.getElementById('title-step-2').style.display = 'none'; document.getElementById('title-step-3').style.display = 'block'; composeFinalImage(); };
        function toggleFilter() { isBW = !isBW; document.getElementById('filter-btn').innerText = `흑백 필터: ${isBW ? 'ON' : 'OFF'}`; composeFinalImage(); }
        function toggleBright() { isBright = !isBright; document.getElementById('bright-btn').innerText = `밝게 필터: ${isBright ? 'ON' : 'OFF'}`; composeFinalImage(); }
    </script>
</body>
</html>
